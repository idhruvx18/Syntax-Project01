<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LiteLearn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">📘 LiteLearn</div>
    <div class="login">Login</div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <p class="tag">⚡ Fast & Lightweight</p>
    <h1>Learn Without Limits</h1>
    <p class="desc">
      Accessible education designed for slow internet connections and low-end devices.
    </p>

    <div class="buttons">
      <button class="primary">Sign Up</button>
      <button class="secondary">Login</button>
    </div>
  </div>

  <!-- Features -->
  <div class="features">
    <div class="card">
      <h3>Rich Content</h3>
      <p>Access notes, courses, and quizzes.</p>
    </div>

    <div class="card">
      <h3>Ultra Fast</h3>
      <p>Optimized for 2G/3G networks.</p>
    </div>

    <div class="card">
      <h3>For Everyone</h3>
      <p>Simple and effective learning system.</p>
    </div>
  </div>

</body>
</html>
